<svg xmlns="http://www.w3.org/2000/svg" width="260" height="260" viewBox="0 0 260 260">
  <g fill="none" stroke="hsl(145, 63%, 32%)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.06">
    <!-- Graduation cap -->
    <g transform="translate(24, 28) rotate(-8)">
      <path d="M 0,8 L 20,0 L 40,8 L 20,16 Z"/>
      <path d="M 6,12 L 6,22 C 6,26 34,26 34,22 L 34,12"/>
      <line x1="37" y1="9" x2="37" y2="20"/>
      <circle cx="37" cy="22" r="1.8"/>
    </g>
    <!-- Book (closed, top view) -->
    <g transform="translate(118, 22) rotate(7)">
      <rect x="0" y="0" width="34" height="26" rx="2"/>
      <line x1="6" y1="7" x2="28" y2="7"/>
      <line x1="6" y1="13" x2="28" y2="13"/>
      <line x1="6" y1="19" x2="22" y2="19"/>
    </g>
    <!-- Pencil -->
    <g transform="translate(200, 38) rotate(42)">
      <path d="M 0,0 L 26,0 L 30,4 L 26,8 L 0,8 Z"/>
      <line x1="6" y1="0" x2="6" y2="8"/>
      <path d="M 0,0 L -5,4 L 0,8"/>
    </g>
    <!-- Star -->
    <g transform="translate(80, 80) rotate(12)">
      <polygon points="10,0 13,7 20,7 14,12 16,20 10,15 4,20 6,12 0,7 7,7"/>
    </g>
    <!-- Small plus -->
    <g transform="translate(172, 92)">
      <line x1="0" y1="6" x2="12" y2="6"/>
      <line x1="6" y1="0" x2="6" y2="12"/>
    </g>
    <!-- Lightbulb -->
    <g transform="translate(26, 124) rotate(-6)">
      <path d="M 14,0 C 7,0 2,5 2,12 C 2,16 4,19 7,22 L 7,26 L 21,26 L 21,22 C 24,19 26,16 26,12 C 26,5 21,0 14,0 Z"/>
      <line x1="8" y1="28" x2="20" y2="28"/>
      <line x1="10" y1="31" x2="18" y2="31"/>
    </g>
    <!-- Apple -->
    <g transform="translate(116, 118) rotate(6)">
      <path d="M 14,8 C 6,5 0,12 0,20 C 0,28 6,38 14,36 C 22,38 28,28 28,20 C 28,12 22,5 14,8 Z"/>
      <path d="M 14,8 C 14,3 18,1 22,1"/>
    </g>
    <!-- Ruler triangle -->
    <g transform="translate(202, 116) rotate(-25)">
      <polygon points="0,0 34,0 34,26"/>
      <line x1="7" y1="0" x2="7" y2="4"/>
      <line x1="14" y1="0" x2="14" y2="6"/>
      <line x1="21" y1="0" x2="21" y2="4"/>
      <line x1="28" y1="0" x2="28" y2="6"/>
    </g>
    <!-- Wavy underline -->
    <g transform="translate(72, 178)">
      <path d="M 0,4 Q 5,0 10,4 T 20,4 T 30,4"/>
    </g>
    <!-- Globe -->
    <g transform="translate(28, 204)">
      <circle cx="16" cy="16" r="16"/>
      <ellipse cx="16" cy="16" rx="16" ry="6"/>
      <line x1="0" y1="16" x2="32" y2="16"/>
      <line x1="16" y1="0" x2="16" y2="32"/>
    </g>
    <!-- Paper airplane -->
    <g transform="translate(118, 200) rotate(18)">
      <polygon points="0,10 30,0 26,28 18,18 10,16 0,10"/>
      <line x1="18" y1="18" x2="30" y2="0"/>
    </g>
    <!-- Compass / clock dial -->
    <g transform="translate(204, 208) rotate(-12)">
      <circle cx="12" cy="12" r="12"/>
      <polygon points="12,2 14,12 10,12" stroke-linejoin="miter"/>
      <circle cx="12" cy="12" r="2"/>
    </g>
  </g>
</svg>
